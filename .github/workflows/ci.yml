name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        # Config (rule selection, ignores, py39 target) lives in pyproject.toml.
        run: ruff check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Hard cap so a wedged test can never burn hours of CI time.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 3.9 matches the local/readthedocs environment; 3.12 is forward-looking.
        python-version: ["3.9", "3.12"]

    env:
      # PyQt5 widgets are constructed in tests (see tests/conftest.py).
      # Run Qt headless and keep matplotlib off any GUI backend.
      QT_QPA_PLATFORM: offscreen
      MPLBACKEND: Agg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Qt runtime system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        # --timeout makes an unexpected hang fail fast (signal method can
        # interrupt blocking C calls); the job timeout-minutes is the hard cap.
        run: pytest tests/ --timeout=120 --timeout-method=signal
